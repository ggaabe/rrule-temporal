name: PR Checks

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20 and 24 run on the bundled temporal-polyfill backend; 26 ships
        # native Temporal, so it exercises the native binding end to end.
        node-version: ['20', '24', '26']
    name: build-test (Node ${{ matrix.node-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test
